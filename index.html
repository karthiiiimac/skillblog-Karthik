<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Skills Shape The Future</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Georgia, serif;
overflow:hidden;
}

/* HERO SECTION */

.hero{
height:100vh;

background:
linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
url('images/bg.jpg');

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;

text-align:center;
padding:40px;
}

.hero-content{
max-width:950px;
}

.logo{
position:absolute;
top:40px;
left:50px;

font-size:32px;
color:#f5ead7;
letter-spacing:1px;
}

.hero h1{
font-size:110px;
line-height:0.95;

color:#f5ead7;

margin-bottom:35px;
}

.hero p{
font-size:28px;
line-height:1.7;

color:#e7dcc8;

max-width:850px;
margin:auto;
}

.start-btn{
display:inline-block;

margin-top:55px;

padding:20px 50px;

background:#f5ead7;
color:#111;

text-decoration:none;

border-radius:60px;

font-size:20px;
font-weight:600;

transition:0.3s;
}

.start-btn:hover{
transform:scale(1.05);
box-shadow:0 10px 40px rgba(255,255,255,0.2);
}

@media(max-width:768px){

.logo{
left:25px;
top:25px;
font-size:24px;
}

.hero{
padding:25px;
}

.hero h1{
font-size:58px;
line-height:1.05;
}

.hero p{
font-size:20px;
line-height:1.8;
}

.start-btn{
padding:16px 36px;
font-size:18px;
margin-top:40px;
}

}

@media(max-width:768px){

.blog{
padding:55px 22px;
}

.back{
font-size:16px;
}

.blog-meta{
font-size:16px;
}

.author{
font-size:18px;
}

.blog h1{
font-size:48px;
line-height:1.15;
margin-bottom:25px;
}

.line{
margin-bottom:35px;
}

.quote{
font-size:24px;
line-height:1.7;
margin-bottom:40px;
}

.stats-box{
padding:25px;
}

.stats-box h3{
font-size:24px;
}

.stats-box p{
font-size:18px;
line-height:1.8;
}

.blog p{
font-size:20px;
line-height:1.95;
}

.blog-image{
border-radius:20px;
margin-bottom:35px;
}

.footer{
font-size:16px;
padding:40px 20px;
}

}

</style>

</head>

<body>

<div class="logo">
SkillBlog
</div>

<section class="hero">

<div class="hero-content">

<h1>
Skills Shape<br>
The Future
</h1>

<p>
In a world driven by innovation, practical skills are becoming more powerful than degrees alone.
</p>

<a href="blog.html" class="start-btn">
Start Reading
</a>

</div>

</section>

</body>
</html>
